<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stockbase</title>
    <!--tailwind-->
    <link href="src/output.css" rel="stylesheet" />
    <!--fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=League+Gothic&family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!--icons-->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css"
    />

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="h-screen font-lexend font-neutral-800 flex">
      <!--sidebar-->
      <div class="w-70 flex flex-col">
        <!--logo-->
        <div class="flex items-center gap-3 h-20 pl-8">
          <div
            class="bg-linear-to-bl from-lime-300 to-lime-600 text-base-100 size-9 rounded-full flex items-center justify-center"
          >
            <i class="fi fi-br-shelves pt-1 text-md"></i>
          </div>
          <div>
            <h1 class="leading-[1rem] font-bold text-md">StockBase</h1>
            <h2 id="userRole" class="leading-[1rem] opacity-60 text-sm font-light">Role</h2>
          </div>
        </div>
        <!--menu-->
        <div class="mt-10 flex-1">
          <ul class="menu w-full p-0 m-0 space-y-2">
            <li>
              <a class="navItem navActive" href="index.html"
                ><span class="">Dashboard</span></a
              >
            </li>
            <li>
              <a class="navItem" href="inventory.html"
                ><span>Inventory</span></a
              >
            </li>
            <li>
              <a class="navItem" href="orders.html"><span>Orders</span></a>
            </li>
          </ul>
        </div>
        <!--options-->
        <div>
          <ul>
            <li>
              <a class="navItem"><span>Help</span></a>
            </li>
            <li>
              <a class="navItem"><span>Settings</span></a>
            </li>
          </ul>
        </div>
        <div class="divider mx-4 my-2 opacity-60"></div>
        <!--user-->
        <div class="mb-10 mt-2">
          <div class="flex mx-10 gap-2">
            <div class="avatar avatar-placeholder">
              <div class="bg-lime-800 text-base-100 size-8 rounded-full">
                <span class="text-xs">KR</span>
              </div>
            </div>
            <div class="flex flex-col flex-1">
              <h1 id="displayName" class="font-bold text-sm leading-[1rem]">Username</h1>
              <h2 id="userEmail" class="opacity-60 font-light text-xs leading-[1rem]">
                email address
              </h2>
            </div>
            <div>
              <a class="btn btn-square btn-sm rounded-lg"
                ><i class="fi fi-br-menu-dots pt-1"></i
              ></a>
            </div>
          </div>
        </div>
      </div>
      <!--main-->
      <div class="flex-1 shadow-md flex flex-col">
        <!--header-->
        <div class="h-20 flex items-center px-10">
          <!--spacer-->
          <div class="flex-1"></div>
          <!--buttons-->
          <div>
            <a
              class="btn btn-square btn-ghost border border-neutral-200 rounded-lg bg-base-100 shadow-none"
              ><i class="fi fi-br-comment-alt-dots pt-1"></i
            ></a>
            <a
              class="btn btn-square btn-ghost border border-neutral-200 rounded-lg bg-base-100 shadow-none"
              ><i class="fi fi-br-bell pt-1"></i
            ></a>
          </div>
        </div>
        <!--body-->
        <div class="flex-1 flex flex-col m-10 mt-0">
          <h1 class="text-2xl font-bold">Inventory Overview</h1>
        </div>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://vzgwjuurlnbthwymudok.supabase.co";
      const SUPABASE_KEY = "sb_publishable_9z4-7snFdcvhw9mI7jaJKA_o36PHtcr";

      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY,
      );

      const userEmail = document.getElementById("userEmail");
      const displayName = document.getElementById("displayName");
      const userRole = document.getElementById("userRole");

      async function loadUserProfile() {
        const {
          data: { session },
          error: sessionError,
        } = await supabaseClient.auth.getSession();

        if (sessionError) {
          console.error("Error loading auth session:", sessionError);
          userEmail.textContent = "Not signed in";
          displayName.textContent = "Guest";
          userRole.textContent = "No role";
          return;
        }

        if (!session?.user) {
          userEmail.textContent = "Not signed in";
          displayName.textContent = "Guest";
          userRole.textContent = "No role";
          return;
        }

        const user = session.user;
        console.log("Current user ID:", user.id);

        userEmail.textContent = user.email ?? "No email";

        const { data: profile, error: profileError } = await supabaseClient
          .from("user_details")
          .select("display_name, role")
          .eq("user_id", user.id)
          .maybeSingle();

        console.log("Profile query result:", { profile, profileError });

        if (profileError) {
          console.error("Error loading user details:", profileError);
          displayName.textContent = user.email ?? "User";
          userRole.textContent = "No role";
          return;
        }

        if (!profile) {
          console.warn("No user_details record found for user:", user.id);
          displayName.textContent = user.email ?? "User";
          userRole.textContent = "No role";
          return;
        }

        displayName.textContent = profile.display_name || user.email || "User";
        userRole.textContent = profile.role || "No role";
      }

      async function checkAuth() {
        const {
          data: { session },
          error,
        } = await supabaseClient.auth.getSession();

        if (error || !session?.user) {
          window.location.href = "auth.html";
          return;
        }

        loadUserProfile();
      }

      checkAuth();
    </script>
  </body>
</html>
